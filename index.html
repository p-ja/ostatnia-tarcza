<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05060f" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2305060f'/%3E%3Cpath d='M16 5l9 22-9-5-9 5z' fill='%237fe0ff'/%3E%3C/svg%3E"
    />
    <title>Ostatnia Tarcza</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #05060f;
        overflow: hidden;
        /* Blokada gestów przeglądarki (pull-to-refresh, zoom) na mobile */
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Prosty loader, zanim Phaser przejmie ekran */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6f7bb6;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="boot">Inicjalizacja systemów…</div>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
